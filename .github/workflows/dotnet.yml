name: Build

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AutoGenPlayer.WinForms.sln

      - name: Build
        run: dotnet build AutoGenPlayer.WinForms.sln --configuration Release --no-restore /p:UseAppHost=false

      - name: Pack
        run: dotnet pack AutoGenPlayer.WinForms/AutoGenPlayer.WinForms.csproj --configuration Release --no-build --output artifacts

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.nupkg
